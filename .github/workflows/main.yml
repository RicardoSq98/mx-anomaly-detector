name: Spark Auto Update

on:
  schedule:
    - cron: '0 14 * * *'  # Corre diario a las 8:00 AM CDMX
  workflow_dispatch:      # Permite correrlo manualmente con el botón

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar y Ejecutar Spark con IA
        run: |
          # 1. Forzamos la instalación en el mismo entorno de ejecución
          python -m pip install --upgrade pip
          python -m pip install pyspark pandas pyarrow requests scipy google-generativeai
          
          # 2. Corremos el script
          python update_spark.py
        env:
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Guardar cambios en el Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Spark Robot"
          
          # Agregamos todos los archivos generados (Datos + Noticias IA)
          git add datos_anomalias.parquet noticias_contexto.json
          
          # Commit solo si hubo cambios reales
          git commit -m "Actualización inteligente: $(date)" || echo "Sin cambios detectados"
          git push
